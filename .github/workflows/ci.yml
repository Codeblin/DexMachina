name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  tests:
    name: Tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Check out repository
        shell: bash
        run: |
          git init .
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          git fetch --depth=1 origin "$GITHUB_SHA"
          git checkout --force FETCH_HEAD

      - name: Install package
        shell: bash
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        shell: bash
        run: python -m pytest --cov=dexmachina --cov-report=term-missing --cov-report=xml

  android-tools-smoke:
    name: Android tools smoke test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check out repository
        shell: bash
        run: |
          git init .
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          git fetch --depth=1 origin "$GITHUB_SHA"
          git checkout --force FETCH_HEAD

      - name: Install package
        shell: bash
        run: python -m pip install -e ".[dev]"

      - name: Install adb
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y android-tools-adb

      - name: Run adb smoke test
        shell: bash
        run: |
          adb version
          dexmachina --no-banner status --offline
          dexmachina --no-banner device list
