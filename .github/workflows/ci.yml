name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  tests:
    name: Tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Check out repository
        shell: bash
        run: |
          git init .
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          git fetch --depth=1 origin "$GITHUB_SHA"
          git checkout --force FETCH_HEAD

      - name: Install package
        shell: bash
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        shell: bash
        run: python -m pytest --cov=dexmachina --cov-report=term-missing --cov-report=xml

  android-tools-smoke:
    name: Android tools smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        shell: bash
        run: |
          git init .
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          git fetch --depth=1 origin "$GITHUB_SHA"
          git checkout --force FETCH_HEAD

      - name: Install package
        shell: bash
        run: python -m pip install -e ".[dev]"

      - name: Install adb
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y android-tools-adb

      - name: Run adb smoke test
        shell: bash
        run: |
          adb version
          dexmachina --no-banner status --offline
          dexmachina --no-banner device list

  emulator-integration:
    name: Rooted emulator integration
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out repository
        shell: bash
        run: |
          git init .
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          git fetch --depth=1 origin "$GITHUB_SHA"
          git checkout --force FETCH_HEAD

      - name: Install package
        shell: bash
        run: python -m pip install -e ".[dev]"

      - name: Install Android emulator image
        shell: bash
        run: |
          SDK_ROOT="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-$HOME/android-sdk}}"
          echo "ANDROID_HOME=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "$SDK_ROOT/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$SDK_ROOT/platform-tools" >> "$GITHUB_PATH"
          echo "$SDK_ROOT/emulator" >> "$GITHUB_PATH"

          SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          AVDMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/avdmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            mkdir -p "$SDK_ROOT/cmdline-tools"
            curl -fsSL \
              "https://dl.google.com/android/repository/commandlinetools-linux-14742923_latest.zip" \
              -o /tmp/android-commandlinetools.zip
            rm -rf "$SDK_ROOT/cmdline-tools/latest" /tmp/android-commandlinetools
            mkdir -p /tmp/android-commandlinetools
            unzip -q /tmp/android-commandlinetools.zip -d /tmp/android-commandlinetools
            mv /tmp/android-commandlinetools/cmdline-tools "$SDK_ROOT/cmdline-tools/latest"
          fi

          yes | "$SDKMANAGER" --sdk_root="$SDK_ROOT" --licenses >/dev/null
          "$SDKMANAGER" --sdk_root="$SDK_ROOT" --install \
            "platform-tools" \
            "emulator" \
            "system-images;android-35;default;x86_64"
          echo no | "$AVDMANAGER" --verbose create avd \
            --force \
            --name dexmachina-ci \
            --package "system-images;android-35;default;x86_64" \
            --device pixel_6

      - name: Boot emulator
        shell: bash
        run: |
          if [ -e /dev/kvm ]; then
            sudo chown "$USER" /dev/kvm || true
          fi
          nohup "$ANDROID_HOME/emulator/emulator" \
            -avd dexmachina-ci \
            -no-window \
            -no-audio \
            -no-boot-anim \
            -gpu swiftshader_indirect \
            -no-snapshot \
            > emulator.log 2>&1 &
          adb wait-for-device
          booted=""
          for _ in {1..90}; do
            booted="$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')"
            if [ "$booted" = "1" ]; then
              break
            fi
            sleep 5
          done
          test "$booted" = "1"
          adb root || true
          adb wait-for-device
          adb shell id

      - name: Run DexMachina emulator smoke
        shell: bash
        run: |
          dexmachina --no-banner up --profile minimal --yes
          dexmachina --no-banner device list
          dexmachina --no-banner device ready
          dexmachina frida-ps -U
